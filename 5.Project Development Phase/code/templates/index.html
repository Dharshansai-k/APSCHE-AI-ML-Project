<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OptiCrop</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="glass-card">

<h1 class="text-center mb-2">

🌱 OptiCrop

</h1>

<p class="text-center subtitle">

Smart Agricultural Production Optimization Engine

</p>

<hr>

<form id="predictionForm">

<div class="row">

<div class="col-md-4 mb-3">

<label>Nitrogen (N)</label>

<input type="number" class="form-control" id="N" placeholder="0-250" required>

</div>

<div class="col-md-4 mb-3">

<label>Phosphorous (P)</label>

<input type="number" class="form-control" id="P" placeholder="0-250" required>

</div>

<div class="col-md-4 mb-3">

<label>Potassium (K)</label>

<input type="number" class="form-control" id="K"  placeholder="0-300" required>

</div>

<div class="col-md-4 mb-3">

<label>Temperature (°C)</label>

<input type="number" step="any" class="form-control" id="temperature" placeholder="Centigrade" required>

</div>

<div class="col-md-4 mb-3">

<label>Humidity (%)</label>

<input type="number" step="any" class="form-control" id="humidity"  placeholder="%" required>

</div>

<div class="col-md-4 mb-3">

<label>Soil pH</label>

<input type="number" step="any" class="form-control" id="ph" placeholder="0-14" required>

</div>

<div class="col-md-12 mb-3">

<label>Rainfall (mm)</label>

<input type="number" step="any" class="form-control" id="rainfall"  placeholder="mm" required>

</div>

</div>

<div class="d-grid">

<button class="btn btn-success btn-lg">

<i class="bi bi-tree-fill"></i>

Predict Best Crop

</button>

<div class="d-grid mt-3">
    <button type="button" id="resetBtn" class="btn btn-outline-light">
        Reset
    </button>
</div>

</div>

</form>

<div id="result" class="mt-4"></div>

</div>

</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<footer class="footer mt-4">

Developed using Flask, Scikit-learn & Random Forest

<br>

OptiCrop © 2026

</footer>

</body>

</html>
